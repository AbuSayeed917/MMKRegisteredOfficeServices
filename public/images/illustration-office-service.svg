<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="buildGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#057baa"/>
      <stop offset="100%" stop-color="#033d5c"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2f2f5"/>
      <stop offset="100%" stop-color="#f0f7fb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#033d5c" flood-opacity="0.12"/>
    </filter>
    <style>
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes mailFly { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-5px, -10px) rotate(-5deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .float1 { animation: float 5s ease-in-out infinite; }
      .float2 { animation: float 4s ease-in-out 0.5s infinite; }
      .float3 { animation: float 6s ease-in-out 1s infinite; }
      .mail-fly { animation: mailFly 4s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="url(#skyGrad)" rx="16"/>

  <!-- Ground -->
  <ellipse cx="240" cy="320" rx="200" ry="20" fill="#c0d8e8" opacity="0.3"/>

  <!-- Main Building -->
  <g filter="url(#softShadow)">
    <!-- Building body -->
    <rect x="140" y="100" width="200" height="210" rx="8" fill="url(#buildGrad)"/>
    <!-- Building top accent -->
    <rect x="140" y="100" width="200" height="6" rx="3" fill="url(#accentGrad)"/>

    <!-- Windows Grid -->
    <!-- Row 1 -->
    <rect x="160" y="125" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.4"/>
    <rect x="200" y="125" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <rect x="240" y="125" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.5"/>
    <rect x="280" y="125" width="40" height="25" rx="4" fill="#0ea5e9" opacity="0.35"/>
    <!-- Row 2 -->
    <rect x="160" y="165" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.35"/>
    <rect x="200" y="165" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.5"/>
    <rect x="240" y="165" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <rect x="280" y="165" width="40" height="25" rx="4" fill="#0ea5e9" opacity="0.45"/>
    <!-- Row 3 -->
    <rect x="160" y="205" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.45"/>
    <rect x="200" y="205" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <rect x="240" y="205" width="30" height="25" rx="4" fill="#0ea5e9" opacity="0.4"/>
    <rect x="280" y="205" width="40" height="25" rx="4" fill="#0ea5e9" opacity="0.5"/>

    <!-- Door -->
    <rect x="215" y="260" width="50" height="50" rx="6" fill="#033d5c"/>
    <rect x="220" y="265" width="40" height="30" rx="4" fill="#0ea5e9" opacity="0.3"/>
    <circle cx="252" cy="288" r="3" fill="#0ea5e9"/>

    <!-- MMK sign on building -->
    <rect x="195" y="244" width="90" height="16" rx="4" fill="white" opacity="0.9"/>
    <text x="240" y="256" font-family="system-ui, sans-serif" font-size="10" fill="#033d5c" font-weight="bold" text-anchor="middle">MMK OFFICE</text>
  </g>

  <!-- Floating Mail Envelope -->
  <g class="mail-fly" transform="translate(80, 80)">
    <rect x="0" y="5" width="50" height="35" rx="5" fill="white" stroke="#c0d8e8" stroke-width="1"/>
    <path d="M2 10 L25 28 L48 10" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M2 38 L18 25" stroke="#c0d8e8" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M48 38 L32 25" stroke="#c0d8e8" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Mail notification dot -->
    <circle cx="46" cy="8" r="6" fill="#ef4444"/>
    <text x="46" y="11" font-family="system-ui" font-size="8" fill="white" text-anchor="middle" font-weight="bold">1</text>
  </g>

  <!-- Floating Shield / Compliance Badge -->
  <g class="float1" transform="translate(365, 90)">
    <rect x="0" y="0" width="80" height="55" rx="12" fill="white" filter="url(#softShadow)"/>
    <!-- Shield icon -->
    <path d="M25 12 L25 30 C25 38 40 44 40 44 C40 44 55 38 55 30 L55 12 L40 7 Z" fill="url(#shieldGrad)" opacity="0.9"/>
    <path d="M34 27 L38 31 L47 22" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="53" font-family="system-ui" font-size="6" fill="#6b7280" text-anchor="middle">Compliant</text>
  </g>

  <!-- Floating Document Card -->
  <g class="float2" transform="translate(15, 200)">
    <rect x="0" y="0" width="90" height="65" rx="10" fill="white" filter="url(#softShadow)"/>
    <!-- Document icon -->
    <rect x="12" y="10" width="28" height="35" rx="3" fill="#e2f2f5" stroke="#c0d8e8" stroke-width="0.5"/>
    <rect x="16" y="16" width="20" height="2" rx="1" fill="#057baa" opacity="0.5"/>
    <rect x="16" y="22" width="16" height="2" rx="1" fill="#057baa" opacity="0.3"/>
    <rect x="16" y="28" width="18" height="2" rx="1" fill="#057baa" opacity="0.4"/>
    <rect x="16" y="34" width="12" height="2" rx="1" fill="#057baa" opacity="0.3"/>
    <!-- Checkmark circle -->
    <circle cx="35" cy="40" r="5" fill="#10b981"/>
    <path d="M32 40 L34 42 L38 38" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Label -->
    <text x="60" y="25" font-family="system-ui" font-size="7" fill="#1a1a1a" text-anchor="middle" font-weight="600">Agreement</text>
    <text x="60" y="35" font-family="system-ui" font-size="7" fill="#10b981" text-anchor="middle" font-weight="600">Signed ✓</text>
  </g>

  <!-- Floating Price Tag -->
  <g class="float3" transform="translate(370, 230)">
    <rect x="0" y="0" width="85" height="50" rx="10" fill="white" filter="url(#softShadow)"/>
    <rect x="8" y="8" width="30" height="30" rx="8" fill="#0ea5e9" opacity="0.1"/>
    <text x="23" y="28" font-family="system-ui" font-size="14" fill="#0ea5e9" text-anchor="middle" font-weight="bold">£</text>
    <text x="58" y="24" font-family="system-ui" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">£75</text>
    <text x="58" y="38" font-family="system-ui" font-size="7" fill="#6b7280" text-anchor="middle">/year</text>
  </g>

  <!-- Location Pin on Building -->
  <g class="pulse" transform="translate(228, 70)">
    <path d="M12 0 C5.4 0 0 5.4 0 12 C0 20 12 30 12 30 C12 30 24 20 24 12 C24 5.4 18.6 0 12 0Z" fill="#0ea5e9"/>
    <circle cx="12" cy="12" r="5" fill="white"/>
    <circle cx="12" cy="12" r="2" fill="#0ea5e9"/>
  </g>

  <!-- Decorative Elements -->
  <circle cx="95" cy="310" r="4" fill="#0ea5e9" opacity="0.2"/>
  <circle cx="400" cy="310" r="3" fill="#057baa" opacity="0.15"/>
  <circle cx="60" cy="60" r="5" fill="#38bdf8" opacity="0.15"/>
  <circle cx="440" cy="60" r="4" fill="#0ea5e9" opacity="0.1"/>

  <!-- Small floating plus signs -->
  <text x="130" y="70" font-family="system-ui" font-size="14" fill="#0ea5e9" opacity="0.2">+</text>
  <text x="410" y="170" font-family="system-ui" font-size="12" fill="#0ea5e9" opacity="0.15">+</text>
  <text x="50" cy="160" font-family="system-ui" font-size="10" fill="#057baa" opacity="0.15">+</text>
</svg>
