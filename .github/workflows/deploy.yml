name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Build & Deploy to Azure
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/mmk-ros:${{ github.sha }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/mmk-ros:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/mmk-ros:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/mmk-ros:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/mmk-ros:latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies & run migrations
        env:
          DATABASE_URL: ${{ secrets.AZURE_DATABASE_URL }}
        run: |
          npm ci
          npx prisma migrate deploy

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/mmk-ros:${{ github.sha }}
